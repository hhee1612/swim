  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const MOODS = [
  { emoji: "😄", label: "超开心" }, { emoji: "🙂", label: "还不错" }, { emoji: "😮‍💨", label: "有点累" }, { emoji: "😴", label: "好困" }, { emoji: "💪", label: "超有劲" },
];
const STROKES = ["自由泳", "蛙泳", "仰泳", "蝶泳", "混合"];
const DEFAULT_GOAL = { type: "distance", value: 100 };
const WEEKDAYS = ["日", "一", "二", "三", "四", "五", "六"];

const BADGES = [
  { d: 1, emoji: "🐣", name: "游泳萌新", color: "from-amber-300 to-yellow-400" },
  { d: 7, emoji: "🐠", name: "快乐小鱼", color: "from-cyan-300 to-sky-400" },
  { d: 21, emoji: "🐬", name: "灵动海豚", color: "from-sky-400 to-blue-500" },
  { d: 50, emoji: "🐳", name: "深海鲸鱼", color: "from-blue-500 to-indigo-500" },
  { d: 100, emoji: "🥉", name: "铜牌泳将", color: "from-orange-400 to-amber-600" },
  { d: 200, emoji: "🥈", name: "银牌健将", color: "from-slate-300 to-slate-500" },
  { d: 365, emoji: "🥇", name: "金牌冠军", color: "from-yellow-400 to-amber-500" },
  { d: 500, emoji: "👑", name: "奥运传奇", color: "from-fuchsia-500 to-purple-600" },
];
function getBadgeInfo(days) { let c = null, n = null; for (const b of BADGES) { if (days >= b.d) c = b; else { n = b; break; } } return { current: c, next: n }; }

function paceSeconds(distance, duration) { if (!distance || !duration) return null; return (duration * 60 / distance) * 100; }
function fmtPace(sec) { if (sec == null) return null; const m = Math.floor(sec / 60), s = Math.round(sec % 60); return m + "'" + String(s).padStart(2, "0") + '"'; }
function paceStr(distance, duration) { return fmtPace(paceSeconds(distance, duration)); }

function longestStreak(records) {
  const dates = [...new Set(records.filter((r) => r.swam).map((r) => r.date))].sort();
  let best = 0, cur = 0, prev = null;
  for (const d of dates) {
    if (prev) { const diff = (new Date(d) - new Date(prev)) / 86400000; cur = diff === 1 ? cur + 1 : 1; } else cur = 1;
    best = Math.max(best, cur); prev = d;
  }
  return best;
}

function goalInfo(goal, totalDistance, totalCount, streak) {
  if (goal.type === "count") {
    const pct = Math.min(100, totalCount / goal.value * 100), done = totalCount >= goal.value;
    return { title: "🏆 游泳次数目标", edit: "目标 " + goal.value + "次", pct, text: "已游 " + totalCount + " 次（" + pct.toFixed(0) + "%）" + (done ? " · 🎉 达成！" : " · 还差 " + (goal.value - totalCount) + " 次") };
  }
  if (goal.type === "days") {
    const pct = Math.min(100, streak / goal.value * 100), done = streak >= goal.value;
    return { title: "🏆 连续打卡目标", edit: "目标 连续" + goal.value + "天", pct, text: "已连续 " + streak + " 天（" + pct.toFixed(0) + "%）" + (done ? " · 🎉 达成！" : " · 还差 " + (goal.value - streak) + " 天") };
  }
  const pct = Math.min(100, totalDistance / (goal.value * 1000) * 100), remain = Math.max(0, goal.value * 1000 - totalDistance);
  return { title: "🏆 离目标还有多远", edit: "目标 " + goal.value + "km", pct, text: "已游 " + (totalDistance / 1000).toFixed(2) + " km（" + pct.toFixed(1) + "%）" + (remain > 0 ? " · 还差 " + (remain / 1000).toFixed(2) + " km 达成目标！" : " · 🎉 目标达成！太强了！") };
}

const store = {
  get(key) { try { return localStorage.getItem(key); } catch (e) { return null; } },
  set(key, val) { try { localStorage.setItem(key, val); } catch (e) { alert("存储空间不足，照片太多啦，建议先导出备份～"); } },
  del(key) { try { localStorage.removeItem(key); } catch (e) {} },
  keys(prefix) { const out = []; try { for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (k && k.startsWith(prefix)) out.push(k); } } catch (e) {} return out; },
};

function todayStr() { const d = new Date(); return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10); }
function dstr(d) { return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10); }
function calcStreak(records) {
  const sd = new Set(records.filter((r) => r.swam).map((r) => r.date));
  if (sd.size === 0) return 0;
  let streak = 0, cursor = new Date(todayStr() + "T00:00:00");
  if (!sd.has(dstr(cursor))) { cursor.setDate(cursor.getDate() - 1); if (!sd.has(dstr(cursor))) return 0; }
  while (sd.has(dstr(cursor))) { streak++; cursor.setDate(cursor.getDate() - 1); }
  return streak;
}
function compressImage(file, maxDim = 700, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => { const img = new Image(); img.onload = () => { let { width, height } = img; if (width > height && width > maxDim) { height = (height * maxDim) / width; width = maxDim; } else if (height > maxDim) { width = (width * maxDim) / height; height = maxDim; } const c = document.createElement("canvas"); c.width = width; c.height = height; c.getContext("2d").drawImage(img, 0, 0, width, height); resolve(c.toDataURL("image/jpeg", quality)); }; img.onerror = reject; img.src = e.target.result; };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

function App() {
  const [records, setRecords] = useState([]);
  const [photos, setPhotos] = useState({});
  const [goal, setGoal] = useState(DEFAULT_GOAL);
  const [showForm, setShowForm] = useState(false);
  const [view, setView] = useState("list");
  const [showGoal, setShowGoal] = useState(false);
  const [goalType, setGoalType] = useState("distance");
  const [goalVal, setGoalVal] = useState("");
  const [viewMonth, setViewMonth] = useState(todayStr().slice(0, 7));
  const [dayDetail, setDayDetail] = useState(null);
  const [lightbox, setLightbox] = useState(null);
  const [showBackup, setShowBackup] = useState(false);
  const [celebrate, setCelebrate] = useState(null);
  const fileRef = useRef(null);
  const importRef = useRef(null);

  const [date, setDate] = useState(todayStr());
  const [swam, setSwam] = useState(true);
  const [mood, setMood] = useState(MOODS[0]);
  const [stroke, setStroke] = useState(STROKES[0]);
  const [distance, setDistance] = useState("");
  const [duration, setDuration] = useState("");
  const [pool, setPool] = useState("");
  const [note, setNote] = useState("");
  const [photo, setPhoto] = useState(null);

  useEffect(() => {
    const r = store.get("swim-records");
    if (r) try { setRecords(JSON.parse(r)); } catch (e) {}
    const g = store.get("swim-goal");
    if (g) { try { const p = JSON.parse(g); if (p && typeof p === "object" && p.type) setGoal(p); else setGoal({ type: "distance", value: (Number(g) || 100000) / 1000 }); } catch (e) { setGoal({ type: "distance", value: (Number(g) || 100000) / 1000 }); } }
    const ph = {};
    for (const k of store.keys("swim-photo:")) { const v = store.get(k); if (v) ph[k.replace("swim-photo:", "")] = v; }
    setPhotos(ph);
  }, []);

  function save(next) { setRecords(next); store.set("swim-records", JSON.stringify(next)); }
  function openGoal() { setGoalType(goal.type); setGoalVal(String(goal.value)); setShowGoal(true); }
  function saveGoal() { const v = Math.max(1, Math.round(Number(goalVal))) || 1; const g = { type: goalType, value: v }; setGoal(g); store.set("swim-goal", JSON.stringify(g)); setShowGoal(false); }
  function resetForm() { setDate(todayStr()); setSwam(true); setMood(MOODS[0]); setStroke(STROKES[0]); setDistance(""); setDuration(""); setPool(""); setNote(""); setPhoto(null); }
  async function onPickPhoto(e) { const file = e.target.files && e.target.files[0]; if (!file) return; try { setPhoto(await compressImage(file)); } catch (err) {} }

  function addRecord() {
    const id = Date.now();
    const dist = swam ? Number(distance) || 0 : 0, dur = swam ? Number(duration) || 0 : 0;
    // 记录前的个人最佳，用于判断是否破纪录
    const prevSwam = records.filter((r) => r.swam);
    const oldMaxDist = Math.max(0, ...prevSwam.map((r) => r.distance));
    const oldPaces = prevSwam.map((r) => paceSeconds(r.distance, r.duration)).filter((x) => x != null);
    const oldBestPace = oldPaces.length ? Math.min(...oldPaces) : null;
    const rec = { id, date, swam, mood: swam ? mood : null, stroke: swam ? stroke : null, distance: dist, duration: dur, pool: swam ? pool.trim() : "", note: note.trim(), hasPhoto: !!photo };
    const next = [rec, ...records].sort((a, b) => b.date.localeCompare(a.date));
    if (photo) { store.set("swim-photo:" + id, photo); setPhotos((p) => ({ ...p, [id]: photo })); }
    save(next); resetForm(); setShowForm(false);
    // 破纪录庆祝
    if (swam) {
      const newPace = paceSeconds(dist, dur);
      if (dist > 0 && dist > oldMaxDist && oldMaxDist > 0) setCelebrate({ icon: "🌊", title: "新纪录！", desc: "最长距离 " + dist + " 米！" });
      else if (newPace != null && oldBestPace != null && newPace < oldBestPace) setCelebrate({ icon: "⚡", title: "配速新纪录！", desc: "最快 " + fmtPace(newPace) + " / 100m！" });
    }
  }
  function del(id) {
    save(records.filter((r) => r.id !== id));
    if (photos[id]) { store.del("swim-photo:" + id); setPhotos((p) => { const n = { ...p }; delete n[id]; return n; }); }
    setDayDetail(null);
  }
  function exportCSV() {
    const header = ["日期", "是否游泳", "心情", "泳姿", "距离(米)", "时间(分钟)", "配速(每百米)", "游泳馆", "备注"];
    const rows = [...records].sort((a, b) => a.date.localeCompare(b.date)).map((r) => [r.date, r.swam ? "游了" : "没游", r.swam && r.mood ? r.mood.emoji + r.mood.label : "", r.swam ? (r.stroke || "") : "", r.swam ? r.distance : "", r.swam ? r.duration : "", r.swam ? (paceStr(r.distance, r.duration) || "") : "", r.pool || "", (r.note || "").replace(/"/g, '""')]);
    const csv = "\ufeff" + [header, ...rows].map((row) => row.map((c) => '"' + c + '"').join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" }); const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "游泳记录_" + todayStr() + ".csv"; a.click(); URL.revokeObjectURL(url);
  }
  function exportBackup() {
    const data = { version: 1, exportedAt: new Date().toISOString(), goal, records, photos };
    const blob = new Blob([JSON.stringify(data)], { type: "application/json" }); const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "游泳备份_" + todayStr() + ".json"; a.click(); URL.revokeObjectURL(url);
  }
  function importBackup(e) {
    const file = e.target.files && e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data || !Array.isArray(data.records)) throw new Error("bad");
        if (!confirm("导入将覆盖当前所有记录和照片，确定继续吗？\n（建议先备份当前数据）")) return;
        store.set("swim-records", JSON.stringify(data.records));
        if (data.goal) store.set("swim-goal", JSON.stringify(typeof data.goal === "object" ? data.goal : { type: "distance", value: (Number(data.goal) || 100000) / 1000 }));
        for (const k of store.keys("swim-photo:")) store.del(k);
        const ph = data.photos || {}; for (const id in ph) store.set("swim-photo:" + id, ph[id]);
        setRecords(data.records); if (data.goal) setGoal(typeof data.goal === "object" ? data.goal : { type: "distance", value: (Number(data.goal) || 100000) / 1000 }); setPhotos(ph); setShowBackup(false);
        alert("✅ 恢复成功！共 " + data.records.length + " 条记录");
      } catch (err) { alert("❌ 导入失败，文件可能损坏或不是本 App 的备份文件"); }
    };
    reader.readAsText(file);
  }

  const swamRecords = records.filter((r) => r.swam);
  const totalDays = swamRecords.length;
  const totalDistance = swamRecords.reduce((s, r) => s + r.distance, 0);
  const totalTime = swamRecords.reduce((s, r) => s + r.duration, 0);
  const streak = calcStreak(records);
  const { current: curBadge, next: nextBadge } = getBadgeInfo(totalDays);
  const avgPace = paceStr(totalDistance, totalTime);
  const gi = goalInfo(goal, totalDistance, totalDays, streak);

  // 个人最佳
  const pbDist = Math.max(0, ...swamRecords.map((r) => r.distance));
  const pbTime = Math.max(0, ...swamRecords.map((r) => r.duration));
  const pbPaces = swamRecords.map((r) => paceSeconds(r.distance, r.duration)).filter((x) => x != null);
  const pbPace = pbPaces.length ? fmtPace(Math.min(...pbPaces)) : null;
  const pbStreak = longestStreak(records);

  // 泳姿统计
  const strokeCount = {}; for (const r of swamRecords) { if (r.stroke) strokeCount[r.stroke] = (strokeCount[r.stroke] || 0) + 1; }
  const strokeList = STROKES.map((s) => ({ name: s, count: strokeCount[s] || 0 })).filter((s) => s.count > 0).sort((a, b) => b.count - a.count);
  const strokeMax = Math.max(1, ...strokeList.map((s) => s.count));

  const recentSessions = [...swamRecords].filter((r) => r.distance > 0).sort((a, b) => a.date.localeCompare(b.date)).slice(-10);
  const recentMax = Math.max(1, ...recentSessions.map((r) => r.distance));

  const monthMap = {}; for (const r of swamRecords) { const m = r.date.slice(0, 7); monthMap[m] = (monthMap[m] || 0) + r.distance; }
  const monthsArr = []; { const d = new Date(); for (let i = 5; i >= 0; i--) { const dd = new Date(d.getFullYear(), d.getMonth() - i, 1); const key = dd.getFullYear() + "-" + String(dd.getMonth() + 1).padStart(2, "0"); monthsArr.push({ label: (dd.getMonth() + 1) + "月", value: (monthMap[key] || 0) / 1000 }); } }
  const monthMax = Math.max(0.1, ...monthsArr.map((m) => m.value));

  const [vy, vm] = viewMonth.split("-").map(Number);
  const firstWeekday = new Date(vy, vm - 1, 1).getDay();
  const daysInMonth = new Date(vy, vm, 0).getDate();
  const recByDate = {}; for (const r of records) (recByDate[r.date] = recByDate[r.date] || []).push(r);
  const monthSwam = swamRecords.filter((r) => r.date.startsWith(viewMonth));
  const monthDist = monthSwam.reduce((s, r) => s + r.distance, 0);
  const monthTime = monthSwam.reduce((s, r) => s + r.duration, 0);
  function changeMonth(delta) { let y = vy, m = vm + delta; if (m < 1) { m = 12; y--; } if (m > 12) { m = 1; y++; } setViewMonth(y + "-" + String(m).padStart(2, "0")); }

  // ===== 生成分享卡片 =====
  async function shareCard() {
    const W = 1080, H = 1350, c = document.createElement("canvas"); c.width = W; c.height = H;
    const ctx = c.getContext("2d");
    const g = ctx.createLinearGradient(0, 0, W, H); g.addColorStop(0, "#a855f7"); g.addColorStop(1, "#d946ef");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "rgba(255,255,255,.10)"; ctx.beginPath(); ctx.arc(900, 180, 160, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(140, 1150, 120, 0, 7); ctx.fill();
    ctx.textAlign = "center"; ctx.fillStyle = "#fff";
    ctx.font = "600 40px 'PingFang SC',sans-serif"; ctx.fillText("✨ 游泳打卡小本本", W / 2, 130);
    ctx.font = "800 60px 'PingFang SC',sans-serif"; ctx.fillText("你今天游进奥运会了吗", W / 2, 210);
    ctx.font = "200px 'PingFang SC',sans-serif"; ctx.fillText(curBadge ? curBadge.emoji : "🏊", W / 2, 470);
    ctx.font = "800 56px 'PingFang SC',sans-serif"; ctx.fillText(curBadge ? curBadge.name : "游泳爱好者", W / 2, 560);
    // 白色面板
    const px = 90, py = 640, pw = W - 180, ph = 460, r = 48;
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.moveTo(px + r, py); ctx.arcTo(px + pw, py, px + pw, py + ph, r); ctx.arcTo(px + pw, py + ph, px, py + ph, r); ctx.arcTo(px, py + ph, px, py, r); ctx.arcTo(px, py, px + pw, py, r); ctx.closePath(); ctx.fill();
    const stats = [["累计打卡", totalDays + " 天"], ["总距离", (totalDistance / 1000).toFixed(1) + " km"], ["最长连续", pbStreak + " 天"], ["平均配速", avgPace ? avgPace + "/100m" : "—"]];
    for (let i = 0; i < 4; i++) {
      const col = i % 2, row = Math.floor(i / 2);
      const cx = px + pw / 4 + col * (pw / 2), cy = py + 130 + row * 200;
      ctx.fillStyle = "#a855f7"; ctx.font = "800 64px 'PingFang SC',sans-serif"; ctx.fillText(stats[i][1], cx, cy);
      ctx.fillStyle = "#c084fc"; ctx.font = "600 34px 'PingFang SC',sans-serif"; ctx.fillText(stats[i][0], cx, cy + 56);
    }
    ctx.fillStyle = "rgba(255,255,255,.9)"; ctx.font = "600 36px 'PingFang SC',sans-serif"; ctx.fillText(todayStr() + " · 继续加油！🏊‍♀️", W / 2, 1230);

            <button onClick={() => setCelebrate(null)} className="mt-5 w-full text-white font-bold py-3 rounded-2xl card active:scale-[0.98]" style={{ background: "linear-gradient(90deg,#a855f7,#d946ef)" }}>太棒了 🎉</button>
          </div>
        </div>
      )}

      {showBackup && (
        <div className="fixed inset-0 bg-purple-900/40 backdrop-blur-sm flex items-end sm:items-center justify-center z-50" onClick={() => setShowBackup(false)}>
          <div className="bg-white w-full max-w-md rounded-t-[32px] sm:rounded-[32px] p-5 safe-bottom" onClick={(e) => e.stopPropagation()}><div className="w-10 h-1 bg-purple-200 rounded-full mx-auto mb-4 sm:hidden"></div><div className="flex items-center justify-between mb-4"><h2 className="text-xl font-black text-purple-700">备份与恢复 ☁️</h2><button onClick={() => setShowBackup(false)} className="text-purple-300 w-9 h-9 rounded-full hover:bg-purple-50 text-3xl leading-none active:scale-90">×</button></div><div className="bg-purple-50 rounded-2xl p-3 text-xs text-purple-500 font-medium mb-4 leading-relaxed">💡 备份文件包含<b>全部记录、照片和目标</b>，换手机时把它导入即可完整还原。建议定期备份，存到微信/网盘/邮箱里更安心。</div><input ref={importRef} type="file" accept="application/json,.json" onChange={importBackup} className="hidden" /><button onClick={exportBackup} className="w-full mb-3 text-white font-bold py-3.5 rounded-2xl card active:scale-[0.98] flex items-center justify-center gap-2" style={{ background: "linear-gradient(90deg,#a855f7,#d946ef)" }}>📦 导出完整备份（含照片）</button><button onClick={() => importRef.current && importRef.current.click()} className="w-full mb-3 bg-purple-100 text-purple-600 font-bold py-3.5 rounded-2xl active:scale-[0.98] flex items-center justify-center gap-2">📥 从备份文件恢复</button><button onClick={exportCSV} className="w-full bg-purple-50 text-purple-400 font-bold py-3 rounded-2xl active:scale-[0.98] flex items-center justify-center gap-2 text-sm">📊 导出 CSV 表格（用于 Excel 查看）</button></div>
        </div>
      )}
    </div>
  );
}

function RecordCard({ r, photo, onDel, onPhoto, hideDate, isPbDist }) {
  const pace = r.swam ? paceStr(r.distance, r.duration) : null;
  return (
    <div className="bg-white/95 backdrop-blur rounded-[24px] p-4 card-flat relative">
      <button onClick={onDel} className="absolute top-3 right-3 text-purple-200 text-lg active:scale-90">🗑️</button>
      {!hideDate && <div className="flex items-center gap-1.5 text-purple-400 text-xs font-bold mb-2">📅 {r.date}{isPbDist && <span className="bg-amber-100 text-amber-600 px-2 py-0.5 rounded-full">🏆 最长距离</span>}</div>}
      {r.swam ? (<>
        <div className="flex items-center gap-2 mb-2 flex-wrap"><span className="text-2xl">{r.mood && r.mood.emoji}</span><span className="bg-purple-100 text-purple-600 text-xs font-bold px-2.5 py-1 rounded-full">游了！{r.mood && r.mood.label}</span>{r.stroke && <span className="bg-fuchsia-100 text-fuchsia-600 text-xs font-bold px-2.5 py-1 rounded-full">{r.stroke}</span>}</div>
        <div className="flex flex-wrap gap-x-4 gap-y-1 text-sm text-purple-700 font-medium">{r.distance > 0 && <span>🏊 {r.distance} m</span>}{r.duration > 0 && <span>⏱️ {r.duration} 分钟</span>}{pace && <span>⚡ {pace}/100m</span>}{r.pool && <span>📍 {r.pool}</span>}</div>
      </>) : (<div className="flex items-center gap-2"><span className="text-2xl">🛋️</span><span className="bg-purple-50 text-purple-400 text-xs font-bold px-2.5 py-1 rounded-full">今天没游 · 休息一下也不错～</span></div>)}
      {r.note && <div className="mt-2 text-sm text-purple-500 bg-purple-50/70 rounded-2xl px-3 py-2">📔 {r.note}</div>}
      {photo && <img src={photo} alt="游泳照片" onClick={onPhoto} className="mt-2 w-full h-44 object-cover rounded-2xl cursor-pointer active:opacity-90" />}
    </div>
  );
}
function Empty({ onAdd }) { return <div className="text-center text-purple-400 bg-white/70 backdrop-blur rounded-[28px] py-12 px-4 card-flat fade-up"><div className="text-4xl mb-2">🌊</div><p className="font-extrabold text-purple-500">还没有记录哦～</p><p className="text-sm mt-1 mb-4">点击下面的按钮，记录今天的游泳吧！</p><button onClick={onAdd} className="text-white font-bold px-7 py-3.5 rounded-full card active:scale-95 inline-flex items-center gap-2" style={{ background: "linear-gradient(90deg,#a855f7,#d946ef)" }}>＋ 记录今天</button></div>; }
function Stat({ icon, label, value, unit }) { return <div className="bg-white/90 backdrop-blur rounded-3xl py-3 px-2 text-center card-flat"><div className="text-base mb-0.5">{icon}</div><div className="text-lg font-black text-purple-600 leading-none">{value}</div><div className="text-[11px] text-purple-400 font-bold mt-1">{label}({unit})</div></div>; }
function PB({ icon, label, value }) { return <div className="bg-gradient-to-b from-purple-50 to-fuchsia-50 rounded-2xl py-3 px-2 text-center"><div className="text-base mb-0.5">{icon}</div><div className="text-base font-black text-purple-600 leading-none">{value}</div><div className="text-[11px] text-purple-400 font-bold mt-1">{label}</div></div>; }
function MonthStat({ value, unit, label }) { return <div><div className="text-lg font-black">{value}</div><div className="text-[11px] text-purple-100 font-bold">{label}({unit})</div></div>; }
function ViewTab({ active, onClick, children }) { return <button onClick={onClick} className={"flex-1 py-2.5 rounded-xl text-[13px] font-bold transition active:scale-95 " + (active ? "bg-white text-purple-600 shadow-sm" : "text-purple-400")}>{children}</button>; }
function GoalType({ active, onClick, children }) { return <button onClick={onClick} className={"py-2.5 rounded-2xl text-xs font-bold transition " + (active ? "text-white shadow-sm" : "bg-purple-50 text-purple-500")} style={active ? { background: "linear-gradient(135deg,#a855f7,#d946ef)" } : {}}>{children}</button>; }
function Field({ label, children }) { return <div className="mb-4"><label className="block text-sm font-bold text-purple-600 mb-1.5">{label}</label>{children}</div>; }
function Toggle({ active, onClick, children }) { return <button onClick={onClick} className={"py-3 rounded-2xl font-bold transition " + (active ? "text-white scale-[1.02] shadow-sm" : "bg-purple-50 text-purple-400")} style={active ? { background: "linear-gradient(135deg,#a855f7,#d946ef)" } : {}}>{children}</button>; }

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
